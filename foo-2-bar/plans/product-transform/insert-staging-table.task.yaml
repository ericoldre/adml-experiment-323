apiVersion: adml/v0
kind: task
type: copy-rows

id: insert-staging-table
title: "Copy srcfoo supplier into vendor_foo_supplier_s"
description: >
  Copies all rows from the srcfoo supplier snapshot table into the
  wrkfoo2bar working table vendor_foo_supplier_s. Source columns are
  mapped 1:1 and obvious augmentation columns are pre-populated;
  remaining Z-columns (ZREGION, ZCOUNTRY) are enriched by later xref tasks.

sourceConnectionName: srcfoo
sourceObjectName: supplier

connectionName: wrkfoo2bar
table: vendor_foo_supplier_s
preClear: {}

columns:
  mappings:
    - source: SupplierID
      target: SupplierID
    - source: Supplier
      target: Supplier
    - source: AddressType
      target: AddressType
    - source: AddressLine1
      target: AddressLine1
    - source: AddressLine2
      target: AddressLine2
    - source: City
      target: City
    - source: StateCode
      target: StateCode
    - source: PostalCode
      target: PostalCode
    - source: CountryCode
      target: CountryCode
    - source: PhoneNumber
      target: PhoneNumber
    - source: ActiveFlag
      target: ActiveFlag
    - source: CreatedDate
      target: CreatedDate
    - source: CreatedBy
      target: CreatedBy
    - source: SupplierID
      target: ZVENDORID
    - source: Supplier
      target: ZVENDOR
    - literal: "Supplier"
      target: ZVENDORTYPE
    - expression: |
        CASE WHEN src."ActiveFlag" THEN 'T' ELSE 'F' END
      target: ZINSERVICE