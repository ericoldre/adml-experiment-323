connectionName: tgtbar
table: vendortype_list
preClearTable: true
dataFile: ../../seed-data/tgtbar/vendortype_list.csv
dataFormat: csv

columns:
  mappings:
    - source: VendorType
      target: VendorType
    - source: Description
      target: Description
    - source: TEST1
      target: TEST1
    - source: Text
      target: Text
