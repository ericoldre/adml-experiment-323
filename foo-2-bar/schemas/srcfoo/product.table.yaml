apiVersion: adml/v0
kind: table-schema

id: product
description: "Product table translated from the source SQL Server definition to the closest Postgres-compatible schema."
database: foo

columns:
  - name: ProductID
    type: integer GENERATED BY DEFAULT AS IDENTITY
    nullable: false
    key: true

  - name: ProductName
    type: varchar(40)
    nullable: false

  - name: SupplierID
    type: varchar(15)
    nullable: true

  - name: CategoryID
    type: integer
    nullable: true

  - name: QuantityPerUnit
    type: varchar(20)
    nullable: true

  - name: UnitPrice
    type: numeric(19,4)
    nullable: true

  - name: UnitsInStock
    type: smallint
    nullable: true

  - name: UnitsOnOrder
    type: smallint
    nullable: true

  - name: ReorderLevel
    type: smallint
    nullable: true

  - name: Discontinued
    type: boolean
    nullable: false
