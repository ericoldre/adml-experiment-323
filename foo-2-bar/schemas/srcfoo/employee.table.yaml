apiVersion: adml/v0
kind: table-schema

id: employee
description: "Employee table translated from the source SQL Server definition to the closest Postgres-compatible schema."
database: foo

columns:
  - name: EmployeeID
    type: integer GENERATED BY DEFAULT AS IDENTITY
    nullable: false
    key: true

  - name: LastName
    type: varchar(20)
    nullable: false

  - name: FirstName
    type: varchar(10)
    nullable: false

  - name: Title
    type: varchar(30)
    nullable: true

  - name: TitleOfCourtesy
    type: varchar(25)
    nullable: true

  - name: BirthDate
    type: timestamp(3)
    nullable: true

  - name: HireDate
    type: timestamp(3)
    nullable: true

  - name: Address
    type: varchar(60)
    nullable: true

  - name: City
    type: varchar(15)
    nullable: true

  - name: Region
    type: varchar(15)
    nullable: true

  - name: PostalCode
    type: varchar(10)
    nullable: true

  - name: Country
    type: varchar(15)
    nullable: true

  - name: HomePhone
    type: varchar(24)
    nullable: true

  - name: Extension
    type: varchar(4)
    nullable: true

  - name: Photo
    type: bytea
    nullable: true

  - name: Notes
    type: text
    nullable: true

  - name: ReportsTo
    type: integer
    nullable: true

  - name: PhotoPath
    type: varchar(255)
    nullable: true
