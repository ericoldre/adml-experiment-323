apiVersion: adml/v0
kind: table-schema

id: customer
description: "Customer table translated from the source SQL Server definition to the closest Postgres-compatible schema."
database: foo

columns:
  - name: CustomerID
    type: integer GENERATED BY DEFAULT AS IDENTITY
    nullable: false
    key: true

  - name: FirstName
    type: varchar(255)
    nullable: false

  - name: LastName
    type: varchar(255)
    nullable: false

  - name: Phone
    type: varchar(25)
    nullable: true

  - name: Email
    type: varchar(255)
    nullable: false

  - name: Street
    type: varchar(255)
    nullable: true

  - name: City
    type: varchar(50)
    nullable: true

  - name: State
    type: varchar(25)
    nullable: true

  - name: Zipcode
    type: varchar(5)
    nullable: true