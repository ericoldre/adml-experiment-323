apiVersion: adml/v0
kind: table-schema

id: vendor
description: "Vendor table translated from the source SQL Server definition to the closest Postgres-compatible schema."
database: tgtbar

columns:
  - name: VendorID
    type: varchar(25)
    nullable: false
    key: true

  - name: Vendor
    type: varchar(50)
    nullable: false

  - name: VendorType
    type: integer
    nullable: false

  - name: Address1
    type: varchar(60)
    nullable: true

  - name: Address2
    type: varchar(60)
    nullable: true

  - name: Address3
    type: varchar(60)
    nullable: true

  - name: Address4
    type: varchar(60)
    nullable: true

  - name: City
    type: varchar(30)
    nullable: true

  - name: Region
    type: varchar(50)
    nullable: true

  - name: Zipcode
    type: varchar(15)
    nullable: true

  - name: Country
    type: varchar(50)
    nullable: true

  - name: Phone
    type: varchar(25)
    nullable: true

  - name: Website
    type: varchar(125)
    nullable: true

  - name: Language
    type: char(2)
    nullable: true

  - name: TaxIDNumber
    type: varchar(20)
    nullable: true

  - name: PaymentTermID
    type: integer
    nullable: true

  - name: CreditLimit
    type: numeric(19,4)
    nullable: true

  - name: ExternalID
    type: integer GENERATED BY DEFAULT AS IDENTITY
    nullable: false

  - name: TestManual
    type: varchar(10)
    nullable: true

  - name: CreatedBy
    type: varchar(50)
    nullable: true

  - name: CreatedOn
    type: timestamp
    nullable: true

  - name: ModifiedBy
    type: varchar(50)
    nullable: true

  - name: ModifiedOn
    type: timestamp
    nullable: true

indexes:
  - name: IX_VENDOR
    columns: [Vendor]
    unique: false

  - name: IX_VENDOR_COUNTRY_PHONE
    columns: [Country, Phone]
    unique: false

  - name: UK_VENDOR
    columns: [ExternalID]
    unique: true